<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Profit Factor Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-red: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px var(--primary-glow);
            filter: brightness(1.1);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .status-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            display: none;
        }

        #statusText {
            margin-bottom: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            display: block;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.3s ease;
        }

        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .pf-value {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .pnl-positive { color: var(--accent); }
        .pnl-negative { color: var(--accent-red); }

        .trader-info {
            display: flex;
            flex-direction: column;
        }

        .trader-name {
            font-weight: 600;
            color: var(--text);
        }

        .trader-address {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .metrics-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
        }

        .metric-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Polymarket Pro Analytics</h1>
            <p class="subtitle">Top 50 Traders Profit Factor • 30 Day Rolling Window</p>
        </header>

        <div class="controls">
            <button id="startBtn">Run Performance Analysis</button>
        </div>

        <div class="status-container" id="statusBox">
            <span id="statusText">Ready to start...</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="table-container fade-in" id="tableBox" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Trader</th>
                        <th>Profit Factor</th>
                        <th>Win Rate</th>
                        <th>Avg PnL</th>
                        <th>Trades (30d)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <!-- Results will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA_API = 'https://data-api.polymarket.com';

        const startBtn = document.getElementById('startBtn');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const tableBox = document.getElementById('tableBox');
        const resultsTableBody = document.getElementById('resultsTableBody');

        async function apiFetch(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        }

        async function fetchTopTraders(limit = 50) {
            const url = `${DATA_API}/v1/leaderboard?timePeriod=ALL&orderBy=PNL&limit=${limit}`;
            const data = await apiFetch(url);
            return data.map(t => ({
                address: t.proxyWallet,
                username: t.userName,
            }));
        }

        async function fetchClosedPositions(address) {
            const url = `${DATA_API}/closed-positions?user=${address}`;
            const data = await apiFetch(url);
            return Array.isArray(data) ? data : [];
        }

        async function fetchActivity(address) {
            // Fetch more than the limit to ensure we cover 30 days
            const url = `${DATA_API}/activity?user=${address}&limit=500`;
            const data = await apiFetch(url);
            return Array.isArray(data) ? data : [];
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            statusBox.style.display = 'block';
            tableBox.style.display = 'none';
            resultsTableBody.innerHTML = '';
            
            try {
                updateStatus('Fetching Top 50 Traders from Leaderboard...', 5);
                const traders = await fetchTopTraders(50);
                const results = [];
                
                const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);

                for (let i = 0; i < traders.length; i++) {
                    const trader = traders[i];
                    const progress = 10 + Math.floor((i / traders.length) * 85);
                    updateStatus(`Analyzing ${trader.username || 'Anonymous'} (${i+1}/50)...`, progress);

                    try {
                        const [positions, activities] = await Promise.all([
                            fetchClosedPositions(trader.address),
                            fetchActivity(trader.address)
                        ]);

                        const recentPositions = positions.filter(p => (p.timestamp * 1000) >= thirtyDaysAgo);
                        const recentTrades = activities.filter(a => a.type === 'TRADE' && (a.timestamp * 1000) >= thirtyDaysAgo);

                        if (recentPositions.length === 0) continue;

                        let grossProfit = 0;
                        let grossLoss = 0;
                        let wins = 0;
                        let maxSingleProfit = 0;
                        let totalPnl = 0;

                        for (const pos of recentPositions) {
                            const pnl = parseFloat(pos.realizedPnl || '0');
                            totalPnl += pnl;
                            if (pnl > 0) {
                                grossProfit += pnl;
                                wins++;
                                if (pnl > maxSingleProfit) maxSingleProfit = pnl;
                            } else if (pnl < 0) {
                                grossLoss += Math.abs(pnl);
                            }
                        }

                        let profitFactor = grossLoss === 0 ? (grossProfit > 0 ? Infinity : 0) : grossProfit / grossLoss;
                        const winRate = (wins / recentPositions.length) * 100;
                        const avgPnl = totalPnl / recentPositions.length;

                        // Filters
                        let excluded = false;
                        let reason = "";

                        if (recentTrades.length < 20) {
                            excluded = true;
                            reason = `Trade count ${recentTrades.length} < 20`;
                        } else if (profitFactor < 1.3) {
                            excluded = true;
                            reason = `PF ${profitFactor.toFixed(2)} < 1.3`;
                        } else if (grossProfit > 0 && (maxSingleProfit / grossProfit) > 0.4) {
                            excluded = true;
                            reason = `Profit concentration ${(maxSingleProfit/grossProfit*100).toFixed(1)}% > 40%`;
                        }

                        if (!excluded) {
                            results.push({
                                username: trader.username || 'Anonymous',
                                address: trader.address,
                                profitFactor,
                                winRate,
                                avgPnl,
                                tradeCount: recentTrades.length,
                                closedCount: recentPositions.length
                            });
                        }
                    } catch (e) {
                        console.error(`Error processing ${trader.address}:`, e);
                    }
                }

                results.sort((a, b) => b.profitFactor - a.profitFactor);
                renderResults(results);
                updateStatus('Analysis Complete.', 100);
                tableBox.style.display = 'block';

            } catch (err) {
                updateStatus(`Error: ${err.message}`, 0);
            } finally {
                startBtn.disabled = false;
            }
        });

        function updateStatus(text, progress) {
            statusText.innerText = text;
            progressBar.style.width = `${progress}%`;
        }

        function renderResults(results) {
            resultsTableBody.innerHTML = results.map(r => `
                <tr class="fade-in">
                    <td>
                        <div class="trader-info">
                            <span class="trader-name">${r.username}</span>
                            <span class="trader-address">${r.address.substring(0,6)}...${r.address.substring(38)}</span>
                        </div>
                    </td>
                    <td><span class="pf-value pnl-positive">${r.profitFactor === Infinity ? '∞' : r.profitFactor.toFixed(3)}</span></td>
                    <td>${r.winRate.toFixed(1)}%</td>
                    <td class="${r.avgPnl >= 0 ? 'pnl-positive' : 'pnl-negative'}">$${r.avgPnl.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                    <td>${r.tradeCount} <small style="color:var(--text-muted)">(${r.closedCount} closed)</small></td>
                    <td><span style="color:var(--accent); font-size: 0.8rem; font-weight: 700;">VERIFIED</span></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
