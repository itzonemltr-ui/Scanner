---
deployment:
  tasks:
    - export DEPLOYPATH=/home/itzonecv/public_html/Scanner/

    # Create deployment directory if not exists
    - /bin/mkdir -p $DEPLOYPATH

    # Copy all web files (HTML, CSS, JS, PHP)
    - /bin/cp -R *.html $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.css $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.js $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.php $DEPLOYPATH 2>/dev/null || true

    # Copy image files
    - /bin/cp -R *.jpeg $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.jpg $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.png $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.svg $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.gif $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.ico $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.webp $DEPLOYPATH 2>/dev/null || true

    # Copy config & environment files
    - /bin/cp -R *.json $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.env $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R .env $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.xml $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.yml $DEPLOYPATH 2>/dev/null || true

    # Copy database files (SQL, SQLite)
    - /bin/cp -R *.sql $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.sqlite $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R *.db $DEPLOYPATH 2>/dev/null || true

    # Copy subfolders (src, assets, includes, api, etc.) — exclude node_modules
    - /bin/cp -R src $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R assets $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R css $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R js $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R images $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R img $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R includes $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R api $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R config $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R lib $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R vendor $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R uploads $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R public $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R routes $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R models $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R controllers $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R views $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R middleware $DEPLOYPATH 2>/dev/null || true
    - /bin/cp -R database $DEPLOYPATH 2>/dev/null || true

    # Node.js — install dependencies on server (excludes node_modules from upload)
    - cd $DEPLOYPATH && /usr/local/bin/npm install --production 2>/dev/null || true
